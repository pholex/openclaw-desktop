<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw</title>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: 'Satoshi', 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; height: 100vh; }
        .sidebar { width: 60px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 8px; -webkit-app-region: drag; }
        .sidebar .tab { width: 42px; height: 42px; border-radius: 12px; border: none; background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: all 0.2s; color: #999; font-size: 0.55rem; -webkit-app-region: no-drag; }
        .sidebar .tab:hover { background: #f0f0f0; color: #333; }
        .sidebar .tab.active { background: #fff0f0; color: #ff4d4d; }
        .sidebar .tab svg { width: 20px; height: 20px; }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; }
        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: flex; align-items: center; justify-content: center; }
        .container { max-width: 720px; width: 100%; background: #fff; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; margin: 20px; }
        .header { padding: 30px; text-align: center; }
        .lobster-wrap { display: block; width: 72px; height: 72px; margin: 0 auto 14px; animation: float 4s ease-in-out infinite; }
        .lobster-wrap svg { width: 100%; height: 100%; filter: drop-shadow(0 0 20px rgba(255,77,77,0.4)); }
        .lobster-wrap .eye-glow { animation: blink 3s ease-in-out infinite; }
        .lobster-wrap .antenna { animation: wiggle 2s ease-in-out infinite; transform-origin: center; }
        .lobster-wrap .claw-left { animation: clawSnap 4s ease-in-out infinite; transform-origin: right center; }
        .lobster-wrap .claw-right { animation: clawSnap 4s ease-in-out infinite 0.2s; transform-origin: left center; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes blink { 0%,90%,100% { opacity: 1; } 95% { opacity: 0.3; } }
        @keyframes wiggle { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-3deg); } }
        @keyframes clawSnap { 0%,85%,100% { transform: rotate(0); } 90% { transform: rotate(-8deg); } }
        .title-main { font-family: 'Clash Display', system-ui, sans-serif; font-size: 2.4rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; background: linear-gradient(135deg, #f0f4ff 0%, #ff4d4d 52%, #00e5cc 100%); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientShift 6s ease infinite; }
        @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .tagline { font-family: 'Clash Display', system-ui, sans-serif; font-size: 0.95rem; font-weight: 500; color: #ff4d4d; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 10px; }
        .form-container { padding: 0 35px 35px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; font-size: 0.9em; }
        input { width: 100%; padding: 14px 18px; border: 2px solid #e1e5e9; border-radius: 12px; font-size: 0.9em; transition: all 0.3s; background: #f8f9fa; }
        input:focus { outline: none; border-color: #6c5ce7; background: white; box-shadow: 0 0 0 3px rgba(108,92,231,0.1); }
        input::placeholder { color: #adb5bd; font-size: 0.85em; }
        .submit-btn { display: inline-flex; align-items: center; gap: 12px; padding: 12px 28px; border-radius: 50px; background: #fff; border: 1px solid #ddd; cursor: pointer; font-size: 1em; transition: all 0.3s; margin-top: 6px; }
        .submit-btn:hover { border-color: #ff4d4d; box-shadow: 0 4px 20px rgba(255,77,77,0.2); transform: translateY(-2px); }
        .submit-btn .btn-badge { padding: 3px 8px; border-radius: 12px; background: #ff4d4d; color: #fff; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .submit-btn .btn-title { font-size: 0.9rem; color: #333; font-weight: 500; }
        .submit-btn .btn-arrow { color: #999; transition: color 0.2s; }
        .submit-btn:hover .btn-arrow { color: #ff4d4d; }
        .btn-wrap { text-align: center; }
        .row { display: flex; gap: 10px; align-items: center; }
        .row input { flex: 1; }
        .row-btn { flex-shrink: 0; padding: 10px 16px; border-radius: 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 0.8rem; font-weight: 600; color: #ff4d4d; transition: all 0.2s; white-space: nowrap; }
        .row-btn:hover { border-color: #ff4d4d; background: #fff5f5; }
        .row-btn:disabled { color: #ccc; border-color: #eee; background: #fafafa; cursor: not-allowed; }
        .advanced-toggle { text-align: center; margin-bottom: 16px; }
        .advanced-toggle label { cursor: pointer; color: #999; font-size: 0.85em; font-weight: 400; }
        .advanced-toggle label:hover { color: #ff4d4d; }
        .advanced-toggle .icon { display: inline-block; transition: transform 0.2s; font-size: 0.7em; margin-right: 4px; }
        .slot-inputs { display: none; margin-bottom: 16px; }
        .slot-inputs.visible { display: block; }
        .slot-inputs .form-group { margin-bottom: 12px; }
        .slot-inputs .form-group label { font-size: 0.85em; color: #666; }
    </style>
</head>
<body>
<div class="sidebar">
    <button class="tab active" onclick="switchTab('settings')" title="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>设置</span>
    </button>
</div>
<div class="main">
    <div id="settings-page" class="page active">
        <div class="container">
            <div class="header">
                <div class="lobster-wrap"><svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M60 10 C30 10 15 35 15 55 C15 75 30 95 45 100 L45 110 L55 110 L55 100 C55 100 60 102 65 100 L65 110 L75 110 L75 100 C90 95 105 75 105 55 C105 35 90 10 60 10Z" fill="url(#lg)" class="claw-body"/><path d="M20 45 C5 40 0 50 5 60 C10 70 20 65 25 55 C28 48 25 45 20 45Z" fill="url(#lg)" class="claw-left"/><path d="M100 45 C115 40 120 50 115 60 C110 70 100 65 95 55 C92 48 95 45 100 45Z" fill="url(#lg)" class="claw-right"/><path d="M45 15 Q35 5 30 8" stroke="#ff4d4d" stroke-width="2" stroke-linecap="round" class="antenna"/><path d="M75 15 Q85 5 90 8" stroke="#ff4d4d" stroke-width="2" stroke-linecap="round" class="antenna"/><circle cx="45" cy="35" r="6" fill="#050810" class="eye"/><circle cx="75" cy="35" r="6" fill="#050810" class="eye"/><circle cx="46" cy="34" r="2" fill="#00e5cc" class="eye-glow"/><circle cx="76" cy="34" r="2" fill="#00e5cc" class="eye-glow"/><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#991b1b"/></linearGradient></defs></svg></div>
                <h1><span class="title-main">OpenClaw</span></h1>
                <p class="tagline">The AI that actually does things</p>
            </div>
            <div class="form-container">
                <div class="form-group" id="simpleGroup">
                    <label>粘贴访问链接</label>
                    <input id="url0" placeholder="http://127.0.0.1:18789/?token=a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6" />
                </div>
                <div class="advanced-toggle" onclick="toggleAdvanced()">
                    <label><span class="icon" id="advIcon">▶</span> 高级选项</label>
                </div>
                <div id="slotInputs" class="slot-inputs">
                    <div class="form-group"><label>龙虾1 链接</label><div class="row"><input id="url0adv" placeholder="http://host:port/?token=..." /><button class="row-btn" id="btn0" onclick="connectSlot(0)" disabled>连接</button></div></div>
                    <div class="form-group"><label>龙虾2 链接</label><div class="row"><input id="url1" placeholder="http://host:port/?token=..." /><button class="row-btn" id="btn1" onclick="connectSlot(1)" disabled>连接</button></div></div>
                    <div class="form-group"><label>龙虾3 链接</label><div class="row"><input id="url2" placeholder="http://host:port/?token=..." /><button class="row-btn" id="btn2" onclick="connectSlot(2)" disabled>连接</button></div></div>
                    <div class="form-group"><label>龙虾4 链接</label><div class="row"><input id="url3" placeholder="http://host:port/?token=..." /><button class="row-btn" id="btn3" onclick="connectSlot(3)" disabled>连接</button></div></div>
                    <div class="form-group"><label>龙虾5 链接</label><div class="row"><input id="url4" placeholder="http://host:port/?token=..." /><button class="row-btn" id="btn4" onclick="connectSlot(4)" disabled>连接</button></div></div>
                </div>
                <div class="btn-wrap" id="simpleBtnWrap">
                    <button class="submit-btn" onclick="save()">
                        <span class="btn-badge">Connect</span>
                        <span class="btn-title">连接到 OpenClaw</span>
                        <span class="btn-arrow">→</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    let advanced = false;

    function toggleAdvanced() {
        advanced = !advanced;
        document.getElementById('slotInputs').classList.toggle('visible', advanced);
        document.getElementById('advIcon').style.transform = advanced ? 'rotate(90deg)' : '';
        document.getElementById('simpleGroup').style.display = advanced ? 'none' : '';
        document.getElementById('simpleBtnWrap').style.display = advanced ? 'none' : '';
        if (advanced) {
            document.getElementById('url0adv').value = document.getElementById('url0').value;
        } else {
            document.getElementById('url0').value = document.getElementById('url0adv').value;
        }
        updateSlotTabs();
    }

    function parseURL(val) {
        try {
            const u = new URL(val.trim());
            return { host: u.origin, token: u.searchParams.get('token') || '' };
        } catch(e) { return null; }
    }

    function getInput(i) {
        if (i === 0 && advanced) return document.getElementById('url0adv');
        if (i === 0) return document.getElementById('url0');
        return document.getElementById('url' + i);
    }

    function updateSlotTabs() {
        for (let i = 0; i < 5; i++) {
            const val = getInput(i).value.trim();
            const btn = document.getElementById('btn' + i);
            if (btn) btn.disabled = !val;
        }
    }

    function buildSlots() {
        const slots = [];
        for (let i = 0; i < 5; i++) {
            const v = getInput(i).value.trim();
            slots.push(v ? parseURL(v) : null);
        }
        return slots;
    }

    function save() {
        const slots = buildSlots();
        if (!slots[0]) { alert('链接格式不正确'); return; }
        window.api.send('save-config', { slots, active: 0 });
    }

    function connectSlot(i) {
        const slots = buildSlots();
        if (!slots[i]) { alert('该链接未配置或格式不正确'); return; }
        window.api.send('save-config', { slots, active: i });
    }

    function getURLFromSlot(slot) {
        return slot && slot.host ? `${slot.host}/?token=${slot.token}` : '';
    }

    window.api.on('load-config', (config) => {
        if (!config || !config.slots) return;
        config.slots.forEach((s, i) => {
            const url = getURLFromSlot(s);
            if (i === 0) { document.getElementById('url0').value = url; document.getElementById('url0adv').value = url; }
            else if (i < 5) document.getElementById('url' + i).value = url;
        });
        const hasMulti = config.slots.filter(s => s && s.host).length > 1;
        if (hasMulti) { advanced = true; document.getElementById('slotInputs').classList.add('visible'); document.getElementById('advIcon').style.transform = 'rotate(90deg)'; document.getElementById('simpleGroup').style.display = 'none'; document.getElementById('simpleBtnWrap').style.display = 'none'; }
        updateSlotTabs();
    });

    document.querySelectorAll('input').forEach(el => el.addEventListener('input', updateSlotTabs));
</script>
</body>
</html>
